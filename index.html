<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anhalt Industrieservice</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            background: url("background.jpg") center center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Dunkler Overlay für bessere Lesbarkeit */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
        }

        /* Kontaktbutton */
        .contact-button {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 2;
        }

        .contact-button a {
            text-decoration: none;
            color: white;
            background: #0078ff;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
        }

        .contact-button a:hover {
            background: #0a0a0a;
        }

        /* Inhalt */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
        }

        .logo {
            width: 220px;
            max-width: 80%;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }

            .contact-button {
                top: 20px;
                right: 20px;
            }

            .contact-button a {
                padding: 10px 18px;
            }
        }
    </style>
</head>
<body>

    <div class="contact-button">
        <a href="mailto:anhalt-industrieservice@web.de">Kontakt</a>
    </div>

    <div class="content">
        <img src="logo.png" alt="Logo" class="logo">

        <h1>Wir bauen gerade unsere Website um.</h1>

        <p>
            Bald sind wir mit einem neuen Auftritt für Sie zurück.
        </p>
    </div>

</body>
</html>
