<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anhalt Industrieservice</title>

    <style>
        @font-face {
            font-family: "TAN Meringue";
            src: url("./TAN MERINGUE.woff") format("woff");
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: url("background.jpg") center center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Dunkler Overlay */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.40);
            z-index: 1;
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 30px;
            width: 220px;
            height: auto;
            z-index: 2;
        }

        .contact-button {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 2;
        }

        .contact-button a {
            display: inline-block;
            text-decoration: none;
            color: #0a0a0a;
            background: #ffffff;
            padding: 20px 40px;
            border-radius: 100px;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .contact-button a:hover {
            background: #f2f2f2;
            transform: scale(1.05);
        }

        /* Hauptinhalt */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
            padding: 20px;
			transform: translateY(200px);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: bold;
            line-height: 1.3;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-top: 20px;
        }

        /* Responsive */
        @media (max-width: 900px) {

            .logo {
                width: 170px;
                top: 20px;
                left: 20px;
            }

            .contact-button {
                top: 20px;
                right: 20px;
            }

            .contact-button a {
                padding: 14px 26px;
                font-size: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

    <img src="logo.png" alt="Anhalt Industrieservice" class="logo">

    <div class="contact-button">
        <a href="mailto:anhalt-industrieservice@web.de">
            Kontakt
        </a>
    </div>

    <div class="content">
        <h1>Wir aktualisieren unsere Website für Sie.</h1>
    </div>

</body>
</html>
